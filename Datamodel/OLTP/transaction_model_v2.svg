<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1100" height="720" viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 24px Arial, sans-serif; fill: #222; }
    .entity-title { font: bold 18px Arial, sans-serif; fill: #ffffff; }
    .attr { font: 15px Arial, sans-serif; fill: #222; }
    .small { font: 14px Arial, sans-serif; fill: #333; }
    .box { fill: #f9fbff; stroke: #2b4c7e; stroke-width: 2; rx: 12; ry: 12; }
    .header { fill: #2b4c7e; rx: 12; ry: 12; }
    .line { stroke: #444; stroke-width: 2.5; }
    .crow { stroke: #444; stroke-width: 2.5; fill: none; }
    .label { font: italic 14px Arial, sans-serif; fill: #444; }
  </style>

  <text x="550" y="40" text-anchor="middle" class="title">Task Management ER Diagram (OLTP / Transactional Model)</text>

  <rect x="80" y="120" width="270" height="220" class="box"/>
  <rect x="80" y="120" width="270" height="46" class="header"/>
  <text x="215" y="149" text-anchor="middle" class="entity-title">USER</text>
  <text x="100" y="195" class="attr">PK  user_id</text>
  <text x="100" y="225" class="attr">first_name</text>
  <text x="100" y="255" class="attr">last_name</text>
  <text x="100" y="285" class="attr">dob</text>
  <text x="100" y="315" class="attr">email_id</text>

  <rect x="80" y="420" width="270" height="190" class="box"/>
  <rect x="80" y="420" width="270" height="46" class="header"/>
  <text x="215" y="449" text-anchor="middle" class="entity-title">TASK</text>
  <text x="100" y="495" class="attr">PK  task_id</text>
  <text x="100" y="525" class="attr">task_description</text>
  <text x="100" y="555" class="attr">recurrence_time</text>
  <text x="100" y="585" class="attr">max_occurrence</text>

  <rect x="620" y="210" width="380" height="330" class="box"/>
  <rect x="620" y="210" width="380" height="46" class="header"/>
  <text x="810" y="239" text-anchor="middle" class="entity-title">TASK_OCCURRENCE</text>
  <text x="640" y="285" class="attr">PK  task_occurrence_id</text>
  <text x="640" y="315" class="attr">FK  user_id</text>
  <text x="640" y="345" class="attr">FK  task_id</text>
  <text x="640" y="375" class="attr">task_occurrence_status</text>
  <text x="640" y="405" class="attr">task_occurrence_start_time</text>
  <text x="640" y="435" class="attr">task_occurrence_due_date</text>
  <text x="640" y="465" class="attr">task_occurrence_completion_time</text>

  <line x1="350" y1="230" x2="620" y2="230" class="line"/>
  <line x1="364" y1="218" x2="364" y2="242" class="line"/>
  <line x1="374" y1="218" x2="374" y2="242" class="line"/>
  <line x1="620" y1="230" x2="598" y2="216" class="crow"/>
  <line x1="620" y1="230" x2="598" y2="230" class="crow"/>
  <line x1="620" y1="230" x2="598" y2="244" class="crow"/>
  <text x="470" y="214" text-anchor="middle" class="label">assigned to</text>
  <text x="376" y="210" class="small">1</text>
  <text x="586" y="210" class="small">M</text>

  <line x1="350" y1="500" x2="620" y2="500" class="line"/>
  <line x1="364" y1="488" x2="364" y2="512" class="line"/>
  <line x1="374" y1="488" x2="374" y2="512" class="line"/>
  <line x1="620" y1="500" x2="598" y2="486" class="crow"/>
  <line x1="620" y1="500" x2="598" y2="500" class="crow"/>
  <line x1="620" y1="500" x2="598" y2="514" class="crow"/>
  <text x="470" y="484" text-anchor="middle" class="label">has</text>
  <text x="376" y="480" class="small">1</text>
  <text x="586" y="480" class="small">M</text>

  <text x="550" y="675" text-anchor="middle" class="small">
    Business rules: One User → many Task Occurrences; One Task → many Task Occurrences; each Task Occurrence belongs to one User and one Task.
  </text>
</svg>
